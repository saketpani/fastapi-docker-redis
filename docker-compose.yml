version: '3.9'

services:

  api:
    build: .
    container_name: fastapi_app

    ports:
      - "8000:8000"

    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RETRY_COUNT: 3

    depends_on:
      - redis

    restart: unless-stopped

  redis:
    image: redis:7-alpine

    container_name: redis_server

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

    restart: unless-stopped

volumes:
  redis-data:
version: '3.9'

services:

  api:
    build: .
    container_name: fastapi_app

    ports:
      - "8000:8000"

    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      RETRY_COUNT: ${RETRY_COUNT}

    depends_on:
      - redis

    restart: unless-stopped

  redis:
    image: redis:7-alpine

    container_name: redis_server

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

